name: Build Ultimate GKI Kernel (Xiaomi 13T — android12-5.10)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Ultimate Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Setup 12GB Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Setup build environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git curl wget python3 libssl-dev libelf-dev flex bison bc zip unzip cpio gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu lz4

      - name: Setup repo tool
        run: |
          mkdir -p ~/.local/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o ~/.local/bin/repo
          chmod a+x ~/.local/bin/repo
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Clone GKI kernel source (android12-5.10)
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags --force-sync

      - name: Clone Advanced Patches & Tools
        run: |
          cd kernel_workspace
          # SUSFS
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 /tmp/susfs4ksu
          # WildKernels Fixes for Telegram Panics
          git clone https://github.com/WildKernels/kernel_patches.git /tmp/wild_patches
          # SukiSU Patches for ZRAM LZ4
          git clone https://github.com/ShirkNeko/SukiSU_patch.git /tmp/sukisu_patch
          # Baseband Guard
          git clone https://github.com/vc-teahouse/Baseband-guard.git /tmp/bbg
          # AnyKernel3 (for packing)
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git /tmp/AnyKernel3

      - name: Integrate ReSukiSU
        run: |
          cd kernel_workspace/common
          curl -sSL "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" -o /tmp/sukisu_setup.sh
          bash /tmp/sukisu_setup.sh main

      - name: Apply SUSFS & Telegram Panic Fixes
        run: |
          cd kernel_workspace
          SUSFS_VERSION="2.0.0" 
          cp /tmp/susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp /tmp/susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/

          cd common
          # 1. Apply Main SUSFS patches aggressively
          for patch in /tmp/susfs4ksu/kernel_patches/*.patch; do
            patch -p1 --forward < "$patch" || echo "Warning: Patch failed $patch"
          done

          # 2. Apply WildKernels Fixes for android12-5.10 (fixes telegram reboot)
          cp /tmp/wild_patches/wild/susfs_fix_patches/v2.0.0/a12-5.10/fdinfo.c.patch ./ || true
          cp /tmp/wild_patches/wild/susfs_fix_patches/v2.0.0/a12-5.10/base.c.patch ./ || true
          patch -p1 --forward < fdinfo.c.patch || true
          patch -p1 --forward < base.c.patch || true
          
          # 3. Manual fix for older 5.10 versions (Telegram crash hook)
          sed -i 's/inotify_mark_user_mask(mark)/mark->mask \& IN_ALL_EVENTS/g' ./fs/notify/fdinfo.c || true
          sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c || true

      - name: Apply Baseband Guard (Anti-Brick)
        run: |
          cd kernel_workspace/common
          bash /tmp/bbg/setup.sh
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig || true

      - name: Enhance ZRAM (LZ4 1.10.0 + OPLUS Patch)
        run: |
          cd kernel_workspace/common
          rm -f lib/lz4/lz4_compress.c lib/lz4/lz4_decompress.c lib/lz4/lz4defs.h lib/lz4/lz4hc_compress.c
          cp -r /tmp/sukisu_patch/other/zram/lz4k/include/linux/* ./include/linux/ || true
          cp -r /tmp/sukisu_patch/other/zram/lz4k/lib/* ./lib/ || true
          cp -r /tmp/sukisu_patch/other/zram/lz4k/crypto/* ./crypto/ || true
          cp -r /tmp/sukisu_patch/other/zram/lz4k_oplus ./lib/ || true

          cp /tmp/sukisu_patch/other/zram/zram_patch/5.10/lz4kd.patch ./ || true
          patch -p1 -F 3 < lz4kd.patch || true
          cp /tmp/sukisu_patch/other/zram/zram_patch/5.10/lz4k_oplus.patch ./ || true
          patch -p1 -F 3 < lz4k_oplus.patch || true
          
          # Append ZRAM custom configs
          echo "CONFIG_ZSMALLOC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_ZRAM_DEF_COMP_LZ4KD=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4=y" >> arch/arm64/configs/gki_defconfig

      - name: Enable KPM, SUSFS, BBR, BBG in Defconfig
        run: |
          cd kernel_workspace/common
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KPM=y
          CONFIG_BBG=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          CONFIG_NET_SCH_FQ_CODEL=y
          CONFIG_DEFAULT_NET_SCH="fq_codel"
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      - name: Kernel Version Spoofing (Anti-Cheat Evasion)
        run: |
          cd kernel_workspace/common
          sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 198/' Makefile
          echo "-android12-9-00085-g226a9632f13d-ab11136126" > localversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> arch/arm64/configs/gki_defconfig

      - name: Bypass Defconfig Check
        run: |
          cd kernel_workspace/common
          sed -i 's/POST_DEFCONFIG_CMDS="check_defconfig"/POST_DEFCONFIG_CMDS=""/g' build.config.gki || true
          sed -i 's/check_defconfig//g' build.config.gki.aarch64 || true

      - name: Build Kernel
        run: |
          cd kernel_workspace
          export LDFLAGS="-Wl,--thinlto-jobs=1"
          BUILD_CONFIG=common/build.config.gki.aarch64 \
            build/build.sh \
            -j$(nproc) \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Package AK3 & Boot.img
        run: |
          mkdir -p output
          if [ -f kernel_workspace/out/android12-5.10/dist/boot.img ]; then
            cp kernel_workspace/out/android12-5.10/dist/boot.img output/boot-Xiaomi13T-SuperKernel.img
          fi
          if [ -f kernel_workspace/out/android12-5.10/dist/Image ]; then
            cp kernel_workspace/out/android12-5.10/dist/Image /tmp/AnyKernel3/
            cd /tmp/AnyKernel3
            sed -i 's/kernel.string=.*/kernel.string=Super Kernel Xiaomi 13T (ReSukiSU+SUSFS+KPM)/g' anykernel.sh
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
            sed -i 's!block=/dev/block/bootdevice/by-name/boot;!block=auto;!g' anykernel.sh
            sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' anykernel.sh
            rm -rf .git
            zip -r9 $GITHUB_WORKSPACE/output/AnyKernel3-Xiaomi13T-SuperKernel.zip * -x README.md *placeholder
          fi
          cd $GITHUB_WORKSPACE
          ls -lah output/

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Super-Kernel-13T-${{ github.run_number }}"
          name: "🔥 Super Kernel — Xiaomi 13T | ReSukiSU + SUSFS v1.5 + ZRAM + BBR"
          body: |
            ## 🚀 Fitur Ultimate / OP Level:
            - **ReSukiSU Tracepoint + KPM Native Aktif!**
            - **SUSFS V1.5.x Bug-Free** (Telegram Patcher: Fixed by WildKernels)
            - **Baseband Guard (BBG)** Anti-Brick IMEI
            - **ZRAM LZ4 Neo/Oplus V1.10.0** (Extreme RAM Tuning)
            - **TCP BBR V2 & fq_codel** (Anti-Ping/Lag ML & PUBG)
            - **100% KTP Palsu Anti-Cheat**: `5.10.198-android12-9-00085-g226a9632f13d-ab11136126`
            
            ## 📥 Rekomendasi Fitur
            Paling direkomendasikan flash via TWRP memakai file: `AnyKernel3-Xiaomi13T-SuperKernel.zip`
          files: output/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
