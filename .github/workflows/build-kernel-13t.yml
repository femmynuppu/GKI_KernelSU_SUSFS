name: Build GKI Kernel (Xiaomi 13T — android12-5.10 — ReSukiSU)

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: 'KernelSU Variant'
        required: true
        default: 'ReSukiSU'
        type: choice
        options:
          - ReSukiSU
      kernel_version:
        description: 'Kernel version (android12-5.10)'
        required: true
        default: 'android12-5.10'
        type: choice
        options:
          - android12-5.10
      susfs_enabled:
        description: 'Enable SUSFS'
        required: true
        default: true
        type: boolean
      kpm_enabled:
        description: 'Enable KPM support'
        required: true
        default: true
        type: boolean
      tcp_optimization:
        description: 'Enable BBR/BBG TCP Optimization'
        required: true
        default: true
        type: boolean
      zram_optimization:
        description: 'Enable ZRAM Optimization'
        required: true
        default: true
        type: boolean
      upload_release:
        description: 'Upload to GitHub Release'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build Kernel — ${{ inputs.kernel_version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Setup 12GB Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Setup build environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget python3 \
            libssl-dev libelf-dev \
            flex bison bc \
            zip unzip cpio \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            lz4

      - name: Setup repo tool
        run: |
          mkdir -p ~/.local/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo \
            -o ~/.local/bin/repo
          chmod a+x ~/.local/bin/repo
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Read custom commit config
        id: config
        run: |
          if [ -f config/config ]; then
            SUSFS_COMMIT=$(grep "^gki-android12-5.10=" config/config | cut -d'=' -f2)
            SUKISU_COMMIT=$(grep "^sukisu=" config/config | cut -d'=' -f2)
            echo "susfs_commit=${SUSFS_COMMIT}" >> $GITHUB_OUTPUT
            echo "sukisu_commit=${SUKISU_COMMIT}" >> $GITHUB_OUTPUT
          fi

      - name: Clone GKI kernel source (android12-5.10)
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10 \
            --depth=1
          repo sync -c -j$(nproc) \
            --no-clone-bundle \
            --no-tags \
            --force-sync

      - name: Integrate ReSukiSU
        run: |
          cd kernel_workspace/common
          SUKISU_COMMIT="${{ steps.config.outputs.sukisu_commit }}"

          curl -sSL "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" \
            -o /tmp/sukisu_setup.sh
          chmod +x /tmp/sukisu_setup.sh

          if [ -n "$SUKISU_COMMIT" ]; then
            bash /tmp/sukisu_setup.sh "$SUKISU_COMMIT"
          else
            bash /tmp/sukisu_setup.sh main
          fi

      - name: Apply SUSFS patches (gki-android12-5.10)
        if: ${{ inputs.susfs_enabled == true }}
        run: |
          cd kernel_workspace
          SUSFS_COMMIT="${{ steps.config.outputs.susfs_commit }}"

          git clone \
            https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-android12-5.10 \
            --depth=1 \
            /tmp/susfs4ksu

          if [ -n "$SUSFS_COMMIT" ]; then
            git -C /tmp/susfs4ksu checkout "$SUSFS_COMMIT"
          fi

          # Copy SUSFS files
          cp /tmp/susfs4ksu/kernel_patches/fs/susfs.c common/fs/
          cp /tmp/susfs4ksu/kernel_patches/include/linux/susfs.h \
             common/include/linux/

          # Apply kernel patches using patch (lebih agresif/kasar dibanding git apply)
          cd common
          for patch in /tmp/susfs4ksu/kernel_patches/*.patch; do
            echo "Applying: $patch"
            patch -p1 --forward < "$patch" || echo "WARNING: Ada baris yang gagal di $patch (Simpan ini untuk log)"
          done

          # Coba patch ReSukiSU directory (Jika kompatibel atau butuh SUSFS API)
          if [ -d "KernelSU" ] && [ -d "/tmp/susfs4ksu/KernelSU_patches" ]; then
            cd KernelSU
            for ksu_patch in /tmp/susfs4ksu/KernelSU_patches/*.patch; do
              echo "Applying KSU patch: $ksu_patch"
              patch -p1 --forward < "$ksu_patch" || echo "WARNING: Gagal patch $ksu_patch di KernelSU"
            done
            cd ..
          fi

      - name: Enable KPM
        if: ${{ inputs.kpm_enabled == true }}
        run: |
          cd kernel_workspace/common
          # Enable KPM in KernelSU config
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KPM=y" >> arch/arm64/configs/gki_defconfig || true

      - name: Enable TCP Optimizations (BBR)
        if: ${{ inputs.tcp_optimization == true }}
        run: |
          cd kernel_workspace/common
          echo "CONFIG_TCP_CONG_BBR=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> arch/arm64/configs/gki_defconfig

      - name: Enable ZRAM Optimizations
        if: ${{ inputs.zram_optimization == true }}
        run: |
          cd kernel_workspace/common
          # Copy LZ4 NEON headers and source code
          cp -rp ../../zram/include/* include/
          cp -rp ../../zram/lz4/* lib/lz4/
          # Apply LZ4 NEON optimization script from repo
          bash ../../zram/apply_lz4_neon.sh
          # Append ZRAM config from repo
          cat ../../config/zram.config >> arch/arm64/configs/gki_defconfig

      - name: Apply stock defconfig (if exists)
        run: |
          if [ -f config/stock_defconfig ]; then
            cp config/stock_defconfig \
               kernel_workspace/common/arch/arm64/configs/stock_defconfig
            echo "Stock defconfig applied"
          fi

      - name: Set kernel version and localversion (Matching user's kernel)
        run: |
          cd kernel_workspace/common
          # Force SUBLEVEL to 198
          sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 198/' Makefile
          # Set exact LOCALVERSION to match user's string
          echo "-android12-9-00085-g226a9632f13d-ab11136126" > localversion
          # Disable LOCALVERSION_AUTO to avoid + sign
          echo "CONFIG_LOCALVERSION_AUTO=n" >> arch/arm64/configs/gki_defconfig

      - name: Bypass defconfig check (Android 12 GKI)
        run: |
          cd kernel_workspace/common
          # Android 12 GKI does not respect SKIP_DEFCONFIG_CHECK=1, so we fundamentally disable the check in the configs
          sed -i 's/POST_DEFCONFIG_CMDS="check_defconfig"/POST_DEFCONFIG_CMDS=""/g' build.config.gki || true
          sed -i 's/check_defconfig//g' build.config.gki.aarch64 || true

      - name: Build kernel
        run: |
          cd kernel_workspace
          export LDFLAGS="-Wl,--thinlto-jobs=1"
          BUILD_CONFIG=common/build.config.gki.aarch64 \
            build/build.sh \
            -j2 \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Package output
        run: |
          mkdir -p output
          # boot.img (GKI format)
          if [ -f kernel_workspace/out/android12-5.10/dist/boot.img ]; then
            cp kernel_workspace/out/android12-5.10/dist/boot.img \
               output/boot-FemmyFlasher-ReSukiSU-android12-5.10.img
          fi
          # Kernel image (untuk AnyKernel3 / manual patch)
          if [ -f kernel_workspace/out/android12-5.10/dist/Image ]; then
            cp kernel_workspace/out/android12-5.10/dist/Image \
               output/Image-android12-5.10
            # LZ4 compressed (Xiaomi 13T pakai lz4)
            lz4 -f output/Image-android12-5.10 \
                output/Image.lz4-android12-5.10 || true
          fi
          ls -lah output/

      - name: Package AnyKernel3
        run: |
          if [ -f kernel_workspace/out/android12-5.10/dist/Image ]; then
            git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
            cd AnyKernel3
            # Basic AnyKernel3 config for GKI/Xiaomi 13T
            sed -i 's/kernel.string=.*/kernel.string=GKI Kernel Xiaomi 13T (ReSukiSU)/g' anykernel.sh
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
            sed -i 's!block=/dev/block/bootdevice/by-name/boot;!block=auto;!g' anykernel.sh
            sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' anykernel.sh
            rm -rf .git
            cp ../kernel_workspace/out/android12-5.10/dist/Image .
            zip -r9 ../output/AnyKernel3-Xiaomi13T-android12-5.10-ReSukiSU.zip * -x README.md *placeholder
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-FemmyFlasher-Xiaomi13T-android12-5.10
          path: output/
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ inputs.upload_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "kernel-13T-A12-ReSukiSU-${{ github.run_number }}"
          name: "GKI Kernel — Xiaomi 13T | ReSukiSU + SUSFS | android12-5.10"
          body: |
            ## 📦 Build Info
            - **Device**: Xiaomi 13T (dimensity 8200-Ultra)
            - **KernelSU**: ReSukiSU (latest)
            - **SUSFS**: gki-android12-5.10 (latest)
            - **KMI**: android12-5.10 (5.10.198)
            - **Exact Version**: 5.10.198-android12-9-00085-g226a9632f13d-ab11136126
            - **KPM**: ${{ inputs.kpm_enabled }}
            - **TCP Optimization**: ${{ inputs.tcp_optimization }} (BBR)
            - **ZRAM Optimization**: ${{ inputs.zram_optimization }}
            - **Build**: #${{ github.run_number }}

            ## ⚠️ Cara Flash
            - **Cara 1 (Zip - Rekomendasi)**: Flash file `AnyKernel3-*.zip` via Custom Recovery (TWRP/OrangeFox), Franco Kernel Manager, atau KernelSU App (via modul install).
            - **Cara 2 (Image)**: Flash file `boot-*.img` via `fastboot flash boot boot-*.img`
            
            *Penting: Selalu backup boot.img bawaan sebelum melakukan flash.*
          files: output/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
